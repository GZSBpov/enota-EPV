<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPV Štabni Zemljevid & Sledenje</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Knjižnica za generiranje QR kod na strani -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; }
        .glavna-posoda { display: flex; width: 100%; height: 100%; }
        #zemljevid { flex: 2; height: 100%; }
        #desni-panel { flex: 1; height: 100%; background: #222; display: flex; flex-direction: column; border-left: 3px solid #444; color: white; overflow-y: auto; }
        .sekcija-naslov { color: white; background: #111; padding: 10px; margin: 0; text-align: center; font-size: 16px; border-bottom: 1px solid #444; }
        .video-posoda { width: 100%; height: 300px; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Stil za generator QR kod */
        .qr-generator-posoda { padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #2a2a2a; border-top: 2px solid #444; flex-grow: 1; }
        .qr-generator-posoda label { font-size: 14px; font-weight: bold; margin-top: 5px; color: #ddd; }
        .qr-generator-posoda select, .qr-generator-posoda input { padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 14px; }
        .gumb-qr { background: #e53935; color: white; font-weight: bold; padding: 12px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .gumb-qr:hover { background: #b71c1c; }
        #qr-izhod { margin: 15px auto; padding: 10px; background: white; border-radius: 4px; display: inline-block; }
        #qr-url-tekst { font-size: 11px; color: #aaa; text-align: center; word-break: break-all; margin-top: 5px; padding: 0 10px; }

        .stalni-napis { background: rgba(0, 0, 0, 0.85); color: white; border: 1px solid #fff; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 12px; white-space: nowrap; }
    </style>
</head>
<body>

<div class="glavna-posoda">
    <!-- Levi del: Karta -->
    <div id="zemljevid"></div>
    
    <!-- Desni del: Video + Generator QR kod -->
    <div id="desni-panel">
        <h3 class="sekcija-naslov">Video Prenos (V ŽIVO)</h3>
        <div class="video-posoda">
            <iframe src="https://www.youtube.com/embed/?listType=user_uploads&user=TVOJ_YOUTUBE_UPORABNIK" allowfullscreen></iframe>
        </div>

        <h3 class="sekcija-naslov">Generator QR kod za terensko prijavo</h3>
        <div class="qr-generator-posoda">
            <label for="qrTip">Tip enote na terenu:</label>
            <select id="qrTip">
                <option value="gasilec">Gasilec / Pešci (Rdeča ikona)</option>
                <option value="vozilo">Vozilo / GVC / AC (Modra ikona)</option>
                <option value="vodja">Vodstvo / Štab / Poveljnik (Rumena ikona)</option>
                <option value="resevalec">Drugi / Reševalci / NMP (Zelena ikona)</option>
            </select>

            <label for="qrClanov">Število članov v tej ekipi:</label>
            <input type="number" id="qrClanov" value="3" min="1">

            <button class="gumb-qr" onclick="ustvariQrKodo()">Ustvari QR kodo za skeniranje</button>
            
            <div style="text-align: center;">
                <div id="qr-izhod"></div>
                <div id="qr-url-tekst"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Tvoj URL naslov spletne aplikacije
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNdPEQjxMFttBgz1_h87RP6SEBjvaELdFth-28Q2HkEPBO08BWsFKQtMyav0SIhaq16w/exec";

    // Inicializacija zemljevida
    const map = L.map('zemljevid').setView([46.3925, 15.5727], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

    let enoteMarkerji = {};
    let enoteSledi = {}; 

    function ustvariIkono(barva) {
        let url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png";
        if (barva === "blue") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png";
        if (barva === "gold") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png";
        if (barva === "green") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png";

        return L.icon({
            iconUrl: url,
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
    }

    // Funkcija za generiranje QR kode s Tvojim GitHub Pages naslovom
    let qrcode = null;
    function ustvariQrKodo() {
        const tip = document.getElementById('qrTip').value;
        const clanov = document.getElementById('qrClanov').value;
        
        const končniUrl = `https://gzsbpov.github.io/enota-EPV/terenEPV.html?tip=${tip}&clanov=${clanov}`;
        
        document.getElementById("qr-izhod").innerHTML = "";
        document.getElementById("qr-url-tekst").innerText = končniUrl;

        qrcode = new QRCode(document.getElementById("qr-izhod"), {
            text: končniUrl,
            width: 180,
            height: 180,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // Generiraj prvo QR kodo takoj ob zagonu
    window.addEventListener('load', ustvariQrKodo);

    async function osveziZemljevid() {
        try {
            const response = await fetch(SCRIPT_URL);
            const matriksaPodatkov = await response.json();
            if (matriksaPodatkov.status === "error") return;

            let zgodovinaPoti = {};
            let zadnjeLokacije = {};

            for (let i = 1; i < matriksaPodatkov.length; i++) {
                const vrstica = matriksaPodatkov[i];
                if (vrstica.length < 5) continue;

                const cas = vrstica[0];
                let surovaEnota = String(vrstica[1]).trim();
                const lat = parseFloat(String(vrstica[2]).replace(',', '.'));
                const lon = parseFloat(String(vrstica[3]).replace(',', '.'));
                const natancnost = String(vrstica[4]).trim();

                if (isNaN(lat) || isNaN(lon)) continue;

                let tip = "gasilec";
                let ime = surovaEnota;
                let clanov = "1";

                if (surovaEnota.includes(":")) {
                    const deli = surovaEnota.split(":");
                    tip = deli[0].toLowerCase();
                    ime = deli[1];
                    clanov = deli[2] || "1";
                } else {
                    if (surovaEnota.toLowerCase().includes("vodja") || surovaEnota.toLowerCase().includes("poveljnik") || surovaEnota.toLowerCase().includes("epv") || surovaEnota.toLowerCase().includes("štab")) tip = "vodja";
                    if (surovaEnota.toLowerCase().includes("vozilo") || surovaEnota.toLowerCase().includes("gvc") || surovaEnota.toLowerCase().includes("ac")) tip = "vozilo";
                }

                if (!zgodovinaPoti[ime]) zgodovinaPoti[ime] = [];
                zgodovinaPoti[ime].push([lat, lon]);

                zadnjeLokacije[ime] = { lat, lon, cas, natancnost, tip, clanov };
            }

            for (const [ime, koordinate] of Object.entries(zgodovinaPoti)) {
                let barvaCrte = "#d32f2f"; 
                let tip = zadnjeLokacije[ime].tip;
                if (tip === "vozilo") barvaCrte = "#1976d2";
                if (tip === "vodja") barvaCrte = "#fbc02d";
                if (tip === "resevalec") barvaCrte = "#388e3c";

                if (enoteSledi[ime]) {
                    enoteSledi[ime].setLatLngs(koordinate);
                } else {
                    enoteSledi[ime] = L.polyline(koordinate, { color: barvaCrte, weight: 3, opacity: 0.6 }).addTo(map);
                }
            }

            for (const [ime, lok] of Object.entries(zadnjeLokacije)) {
                let barvaMarkerja = "red";
                if (lok.tip === "vozilo") barvaMarkerja = "blue";
                if (lok.tip === "vodja") barvaMarkerja = "gold";
                if (lok.tip === "resevalec") barvaMarkerja = "green";

                let prikazniNapis = ime;
                if (lok.tip === "gasilec") {
                    prikazniNapis = `${ime} (${lok.clanov})`;
                }

                const podrobnostiTekst = `<b>${ime}</b> (${lok.tip.toUpperCase()})<br>Članov: ${lok.clanov}<br>Zadnji GPS: ${lok.cas}<br>Natančnost: ${lok.natancnost} m`;

                if (enoteMarkerji[ime]) {
                    enoteMarkerji[ime].setLatLng([lok.lat, lok.lon]);
                    enoteMarkerji[ime].setIcon(ustvariIkono(barvaMarkerja));
                    enoteMarkerji[ime].getPopup().setContent(podrobnostiTekst);
                    enoteMarkerji[ime].setTooltipContent(prikazniNapis);
                } else {
                    let noviMarker = L.marker([lok.lat, lok.lon], { icon: ustvariIkono(barvaMarkerja) })
                        .addTo(map)
                        .bindPopup(podrobnostiTekst);

                    noviMarker.bindTooltip(prikazniNapis, {
                        permanent: true, direction: 'top', offset: [0, -40], className: 'stalni-napis'
                    }).openTooltip();

                    enoteMarkerji[ime] = noviMarker;
                }
            }
        } catch (error) {
            console.error("Napaka na zemljevidu:", error);
        }
    }

    osveziZemljevid();
    setInterval(osveziZemljevid, 5000);
</script>
</body>
</html>
