<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spremljanje enot - EPV</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- QR Code Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #kontrole {
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #ccc;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        #vsebina {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        #zemljevid {
            flex: 3;
            height: 100%;
        }

        #stranska-vrstica {
            flex: 1;
            min-width: 280px;
            padding: 10px;
            background: #ffffff;
            border-left: 1px solid #ccc;
            overflow-y: auto;
        }

        .enota-stikalo {
            padding: 5px 8px;
            margin: 3px 0;
            background: #e9ecef;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Slogi za tiskanje */
        @media print {
            body * {
                visibility: hidden;
            }
            #print-sekcija, #print-sekcija * {
                visibility: visible;
            }
            #print-sekcija {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            #map-print-placeholder {
                width: 100%;
                height: 400px;
                margin-top: 15px;
                border: 1px solid #000;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px;
            }
            th, td {
                border: 1px solid #333;
                padding: 6px 10px;
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <!-- KONTROLNA VRSTICA -->
    <div id="kontrole">
        <label><strong>Dogodek:</strong></label>
        <select id="izbiraIntervencije" onchange="izbranDogodekId=this.value; osveziZemljevid();">
            <option value="">-- Brez aktivnega dogodka --</option>
        </select>
        
        <input type="text" id="novoImeIntervencije" placeholder="Novo ime dogodka...">
        <button onclick="ustvariNovDogodek()">Ustvari dogodek</button>

        <span style="border-left: 1px solid #ccc; margin: 0 5px; height: 20px;"></span>

        <label><strong>Filter časa:</strong></label>
        <select id="filterTipCas" onchange="spremembaTipaFiltra()">
            <option value="vse">Vse lokacije</option>
            <option value="zadnja">Samo zadnje znano stanje</option>
            <option value="ročno">Ročni časovni okno</option>
        </select>
        
        <input type="number" id="filterMinute" placeholder="Minute" style="width: 60px; display: none;" value="30" onchange="shraniNastavitve()">

        <button onclick="pripraviInNatisni()">Natisni poročilo</button>
        <button onclick="preklopiCelZaslon('vsebina')">Cel zaslon</button>
    </div>

    <!-- GLAVNA VSEBINA -->
    <div id="vsebina">
        <div id="zemljevid"></div>

        <div id="stranska-vrstica">
            <h3>Aktivne enote</h3>
            <div id="seznamEnotGumbi">Čakanje na podatke...</div>
            
            <hr>
            
            <h3>QR koda za teren</h3>
            <label>Tip enote:</label>
            <input type="text" id="qrTip" value="Vmesna enota" style="width: 90%;"><br><br>
            <label>Št. članov:</label>
            <input type="number" id="qrClanov" value="3" style="width: 90%;"><br><br>
            <button onclick="ustvariQrKodo()">Generiraj QR</button>
            
            <div id="qr-izhod" style="margin-top: 10px;"></div>
            <div id="qr-url-tekst" style="font-size: 10px; word-break: break-all; color: #666; margin-top: 5px;"></div>
        </div>
    </div>

    <!-- PREDLOGA ZA TISKANJE (Skrita na zaslonu) -->
    <div id="print-sekcija" style="display: none;">
        <h2 id="print-naslov">Intervencija</h2>
        <p>Datum in čas izpisa: <span id="print-datum"></span></p>
        
        <div style="display: flex; gap: 20px; align-items: flex-start;">
            <div id="print-qr-slika"></div>
            <div style="flex: 1;">
                <h4>Sodelujoče enote:</h4>
                <table>
                    <thead>
                        <tr>
                            <th>Enota</th>
                            <th>Zadnja prijava</th>
                            <th>Lokacija (Lat, Lng)</th>
                        </tr>
                    </thead>
                    <tbody id="print-tabela-sodelujocih-telo"></tbody>
                </table>
            </div>
        </div>

        <div id="map-print-placeholder"></div>
    </div>

    <script>
        // --- GLOBALNE SPREMENLJIVKE ---
        let map;
        let enoteMarkerji = {};
        let ročnoSkriteEnote = {};
        let vseIntervencije = [];
        let trenutnaIntervencija = "";
        let izbranDogodekId = "";
        let narisaniSektorjiSloj;
        let printMapInstance = null;

        // Povezava do vašega Apps Script / Backend URL-ja
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7BvUZKpXxeUZlncA01hVLngHIhI3nsWADQFec1ETrD04JnN2TO8Ug5nWzsTXNbeTelg/exec"; 

        // --- INICIALIZACIJA ZEMLJEVIDA IN APLIKACIJE ---
        window.onload = function() {
            map = L.map('zemljevid').setView([46.0569, 14.5058], 9); // Center Slovenije

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap prispevalci'
            }).addTo(map);

            narisaniSektorjiSloj = L.layerGroup().addTo(map);

            naloziIntervencije();
            naloziNastavitev();
            osveziZemljevid();

            // Periodično osveževanje na vsakih 10 sekund (Asinhrono)
            setInterval(osveziZemljevid, 10000);
        };

        // --- ASINHRONO PRIDOBIVANJE PODATKOV ---
        async function osveziZemljevid() {
            try {
                const response = await fetch(APPS_SCRIPT_URL + "?akcija=pridobiPodatke");
                if (!response.ok) throw new Error("Omrežna napaka ob pridobivanju podatkov.");
                
                const podatki = await response.json();
                prikaziPodatkeNaMapi(podatki);
            } catch (napaka) {
                console.error("Napaka pri osveževanju zemljevida:", napaka);
            }
        }

        function prikaziPodatkeNaMapi(podatki) {
            if (!podatki || !Array.isArray(podatki)) return;

            const seznamContainer = document.getElementById("seznamEnotGumbi");
            if (seznamContainer && podatki.length > 0) {
                seznamContainer.innerHTML = "";
            }

            podatki.forEach(enota => {
                const imeEnote = enota.ime || enota.enotaId || "Neznana enota";
                const lat = parseFloat(enota.lat);
                const lng = parseFloat(enota.lng);
                const casPrijaveStr = enota.cas ? pretvoriVCas(enota.cas).toLocaleTimeString("sl-SI") : new Date().toLocaleTimeString("sl-SI");

                if (isNaN(lat) || isNaN(lng)) return;

                // Preverjanje filtrov
                if (ročnoSkriteEnote[imeEnote]) return;

                // Ustvarjanje ali posodabljanje markerja
                if (enoteMarkerji[imeEnote]) {
                    enoteMarkerji[imeEnote].setLatLng([lat, lng]);
                    enoteMarkerji[imeEnote].options.casZadnjePrijave = casPrijaveStr; // Shranimo čas za tisk
                } else {
                    const noviMarker = L.marker([lat, lng], {
                        icon: ustvariIkono('blue'),
                        casZadnjePrijave: casPrijaveStr
                    }).bindPopup(`<b>${imeEnote}</b><br>Čas: ${casPrijaveStr}`);
                    
                    noviMarker.addTo(map);
                    enoteMarkerji[imeEnote] = noviMarker;
                }

                // Posodobitev seznama v stranski vrstici
                if (seznamContainer) {
                    const vrstica = document.createElement("div");
                    vrstica.className = "enota-stikalo";
                    vrstica.innerHTML = `
                        <span>${imeEnote}</span>
                        <input type="checkbox" ${!ročnoSkriteEnote[imeEnote] ? 'checked' : ''} 
                               onchange="preklopiEnoto('${imeEnote}', this.checked)">
                    `;
                    seznamContainer.appendChild(vrstica);
                }
            });
        }

        // --- UPRAVLJANJE DOGODKOV IN FILTROV ---
        function ustvariNovDogodek() {
            const input = document.getElementById("novoImeIntervencije");
            const v = input ? input.value.trim() : "";
            if (!v) return;

            izbranDogodekId = v; 
            trenutnaIntervencija = v;

            if (!vseIntervencije.includes(v)) { 
                vseIntervencije.push(v); 
                localStorage.setItem("epv_intervencije_seznam", JSON.stringify(vseIntervencije)); 
            }
            localStorage.setItem("epv_intervencije_trenutna", v);
            
            izrisiSpustniSeznamZgodovine();
            input.value = "";
            
            if (narisaniSektorjiSloj) {
                narisaniSektorjiSloj.clearLayers();
            }
        }

        function izrisiSpustniSeznamZgodovine() {
            const s = document.getElementById("izbiraIntervencije"); 
            if (!s) return;
            
            s.innerHTML = '<option value="">-- Brez aktivnega dogodka --</option>';
            [...new Set(vseIntervencije)].forEach(d => {
                if (d) {
                    const isSelected = (d === izbranDogodekId) ? 'selected' : '';
                    s.innerHTML += `<option value="${d}" ${isSelected}>${d}</option>`;
                }
            });
        }

        function pretvoriVCas(suroviCas) {
            if (!suroviCas) return new Date();
            let d = new Date(suroviCas); 
            return isNaN(d.getTime()) ? new Date() : d;
        }
        
        function preklopiEnoto(i, v) { 
            ročnoSkriteEnote[i] = !v; 
            shraniNastavitve(); 
        }
        
        function spremembaTipaFiltra() { 
            const elTip = document.getElementById("filterTipCas");
            const elMin = document.getElementById("filterMinute");
            if (elTip && elMin) {
                elMin.style.display = (elTip.value === "ročno") ? "block" : "none"; 
            }
            shraniNastavitve(); 
        }
        
        function shraniNastavitve() { 
            const elTip = document.getElementById("filterTipCas");
            const elMin = document.getElementById("filterMinute");
            
            if (elTip) localStorage.setItem("epv_filter_tip", elTip.value); 
            if (elMin) localStorage.setItem("epv_filter_min", elMin.value); 
            localStorage.setItem("epv_skrite_enote", JSON.stringify(ročnoSkriteEnote)); 
            
            osveziZemljevid(); 
        }
        
        function naloziNastavitev() { 
            let t = localStorage.getItem("epv_filter_tip"), 
                m = localStorage.getItem("epv_filter_min"), 
                s = localStorage.getItem("epv_skrite_enote"); 
                
            if (t && document.getElementById("filterTipCas")) document.getElementById("filterTipCas").value = t; 
            if (m && document.getElementById("filterMinute")) document.getElementById("filterMinute").value = m; 
            if (s) {
                try { ročnoSkriteEnote = JSON.parse(s); } catch(e) { ročnoSkriteEnote = {}; }
            }
            spremembaTipaFiltra(); 
        }
        
        function preklopiCelZaslon(id) { 
            let e = document.getElementById(id); 
            if (!e) return;
            if (!document.fullscreenElement) {
                e.requestFullscreen().catch(err => console.warn("Fullscreen onemogočen:", err));
            } else {
                document.exitFullscreen();
            }
        }
        
        function ustvariIkono(b) { 
            return L.icon({ 
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${b}.png`, 
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', 
                iconSize: [25, 41], 
                iconAnchor: [12, 41], 
                popupAnchor: [1, -34], 
                shadowSize: [41, 41] 
            }); 
        }
        
        function naloziIntervencije() { 
            let s = localStorage.getItem("epv_intervencije_seznam"), 
                t = localStorage.getItem("epv_intervencije_trenutna"); 
                
            if (s) {
                try { vseIntervencije = JSON.parse(s); } catch(e) { vseIntervencije = []; }
            }
            if (t) { 
                trenutnaIntervencija = t; 
                izbranDogodekId = t; 
            } 
            izrisiSpustniSeznamZgodovine(); 
        }
        
        function ustvariQrKodo() {
            const t = document.getElementById('qrTip').value;
            const c = document.getElementById('qrClanov').value;
            const url = `https://gzsbpov.github.io/enota-EPV/terenEPV.html?tip=${encodeURIComponent(t)}&clanov=${encodeURIComponent(c)}`;
            
            const qrIzhod = document.getElementById("qr-izhod");
            qrIzhod.innerHTML = ""; 
            document.getElementById("qr-url-tekst").innerText = url;
            
            new QRCode(qrIzhod, { 
                text: url, 
                width: 110, 
                height: 110 
            });
        }

        // --- FUNKCIJA ZA TISKANJE ---
        function pripraviInNatisni() {
            const izbranaIntervencija = document.getElementById("izbiraIntervencije").value || "Splošno spremljanje (Brez dogodka)";
            document.getElementById("print-naslov").innerText = "Intervencija: " + izbranaIntervencija;
            document.getElementById("print-datum").innerText = new Date().toLocaleString("sl-SI");

            // Generiranje QR kode za tisk
            const qrCilj = document.getElementById("print-qr-slika");
            qrCilj.innerHTML = "";
            
            const originalnaQrSlika = document.getElementById("qr-izhod").querySelector("img");
            if (originalnaQrSlika && originalnaQrSlika.src) {
                const novaSlika = document.createElement("img");
                novaSlika.src = originalnaQrSlika.src;
                novaSlika.style.width = "150px";
                novaSlika.style.height = "150px";
                qrCilj.appendChild(novaSlika);
            } else {
                const urlZapis = document.getElementById("qr-url-tekst").innerText;
                if (urlZapis) {
                    new QRCode(qrCilj, { text: urlZapis, width: 150, height: 150 });
                }
            }

            // Izpis tabele sodelujočih
            const tabelaTelo = document.getElementById("print-tabela-sodelujocih-telo");
            tabelaTelo.innerHTML = ""; 

            const gumbiEnote = document.querySelectorAll("#seznamEnotGumbi div.enota-stikalo");
            let dodanoSodelujocih = 0;

            gumbiEnote.forEach(vrstica => {
                const span = vrstica.querySelector("span");
                const tekst = span ? (span.innerText || span.textContent) : "";
                
                if (tekst && !tekst.includes("Čakanje na podatke")) {
                    let imeEnote = tekst.trim();
                    let casPrijave = "Neznan čas";
                    let lokacijaText = "Zaznano na mapi";

                    if (enoteMarkerji[imeEnote]) {
                        const marker = enoteMarkerji[imeEnote];
                        const lok = marker.getLatLng();
                        lokacijaText = `${lok.lat.toFixed(5)}, ${lok.lng.toFixed(5)}`;
                        
                        // Uporaba točnega časa zadnje prijave
                        if (marker.options && marker.options.casZadnjePrijave) {
                            casPrijave = marker.options.casZadnjePrijave;
                        } else {
                            casPrijave = new Date().toLocaleTimeString("sl-SI");
                        }
                    }

                    let izpisVrstica = `<tr>
                        <td><strong>${imeEnote}</strong></td>
                        <td>${casPrijave}</td>
                        <td>${lokacijaText}</td>
                    </tr>`;
                    tabelaTelo.innerHTML += izpisVrstica;
                    dodanoSodelujocih++;
                }
            });

            if (dodanoSodelujocih === 0) {
                tabelaTelo.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">Trenutno ni aktivno zabeleženih enot.</td></tr>`;
            }

            // Priprava tiskovnega zemljevida
            if (map) {
                const center = map.getCenter();
                const trenutniZoom = map.getZoom();
                const tiskovniZoom = trenutniZoom + 1; 

                const placeholder = document.getElementById("map-print-placeholder");
                placeholder.innerHTML = "";

                if (printMapInstance) {
                    printMapInstance.remove(); // Počiščenje prejšnje instance
                }

                printMapInstance = L.map('map-print-placeholder', {
                    center: center,
                    zoom: tiskovniZoom,
                    zoomControl: false,
                    attributionControl: false
                });

                map.eachLayer(function(layer) {
                    if (layer instanceof L.TileLayer) {
                        L.tileLayer(layer._url, layer.options).addTo(printMapInstance);
                    } else if (layer instanceof L.Polygon) {
                        L.polygon(layer.getLatLngs(), layer.options).addTo(printMapInstance);
                    } else if (layer instanceof L.Polyline) {
                        L.polyline(layer.getLatLngs(), layer.options).addTo(printMapInstance);
                    } else if (layer instanceof L.Marker) {
                        if (layer.options && layer.options.icon) {
                            L.marker(layer.getLatLng(), { icon: layer.options.icon }).addTo(printMapInstance);
                        }
                    }
                });

                setTimeout(() => {
                    window.print();
                }, 800);
            } else {
                window.print();
            }
        }
    </script>
</body>
</html>
