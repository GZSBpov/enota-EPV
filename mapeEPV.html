<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPV Štabni Zemljevid & Sledenje</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: Arial, sans-serif; overflow: hidden; background: #222; }
        
        /* Zakleni zaslon za geslo */
        #zaklep-zaslona {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 99999; display: flex; align-items: center; justify-content: center;
        }
        .geslo-posoda { background: #222; padding: 30px; border-radius: 8px; border: 2px solid #ff9800; text-align: center; max-width: 350px; width: 90%; color: white; }
        .geslo-posoda h2 { margin-top: 0; color: #ff9800; font-size: 20px; text-transform: uppercase; }
        .geslo-posoda input { width: 100%; padding: 12px; margin: 15px 0; background: #333; color: white; border: 1px solid #555; border-radius: 4px; text-align: center; font-size: 16px; }
        .geslo-posoda button { background: #ff9800; color: black; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .geslo-posoda button:hover { background: #e68a00; }
        .napaka-tekst { color: #e53935; font-size: 13px; margin-top: 10px; display: none; }

        /* Glavna aplikacija */
        .glavna-posoda { display: flex; width: 100%; height: 100%; }
        .fullscreen-wrapper { position: relative; flex: 2; height: 100%; min-height: 100%; }
        #zemljevid { width: 100%; height: 100%; min-height: 100%; background: #111; }
        
        #desni-panel { flex: 1; height: 100%; background: #222; display: flex; flex-direction: column; border-left: 3px solid #444; color: white; }
        .tretjina-panela { position: relative; height: 33.33vh; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid #444; background: #222; }
        .tretjina-panela:last-child { border-bottom: none; }
        
        .sekcija-naslov { color: white; background: #111; padding: 8px; margin: 0; text-align: center; font-size: 14px; border-bottom: 1px solid #444; text-transform: uppercase; letter-spacing: 0.5px; padding-right: 110px; }
        
        .video-wrapper { position: relative; width: 100%; flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .filter-posoda { padding: 10px 15px; background: #1b1b1b; flex: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
        .filter-posoda label { font-size: 12px; font-weight: bold; color: #ff9800; }
        .filter-vrstica { display: flex; gap: 10px; align-items: center; }
        .filter-posoda select, .filter-posoda input[type="number"], .filter-posoda input[type="text"] { padding: 6px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 12px; }
        .filter-posoda input[type="number"] { width: 60px; }
        .gumb-intervencija { background: #ff9800; color: black; font-weight: bold; padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .gumb-intervencija:hover { background: #e68a00; }
        
        .seznam-enot-okno { flex: 1; min-height: 60px; overflow-y: auto; background: #252525; padding: 6px; border-radius: 4px; border: 1px solid #444; margin-top: 2px; }
        .enota-stikalo { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px; font-size: 12px; border-bottom: 1px solid #333; }
        .enota-stikalo:last-child { border-bottom: none; }
        .enota-stikalo input { cursor: pointer; transform: scale(1.1); }

        .qr-generator-posoda { padding: 10px 15px; display: flex; flex-direction: column; gap: 6px; background: #2a2a2a; flex: 1; overflow-y: auto; }
        .qr-generator-posoda label { font-size: 12px; font-weight: bold; color: #ddd; }
        .qr-generator-posoda select, .qr-generator-posoda input { padding: 6px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 12px; }
        .gumb-qr { background: #e53935; color: white; font-weight: bold; padding: 8px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .gumb-qr:hover { background: #b71c1c; }
        #qr-izhod { margin: 5px auto; padding: 6px; background: white; border-radius: 4px; display: inline-block; }
        #qr-izhod img { width: 110px !important; height: 110px !important; }
        #qr-url-tekst { font-size: 10px; color: #aaa; text-align: center; word-break: break-all; margin-top: 2px; padding: 0 5px; }

        .gumb-povecaj {
            position: absolute; top: 5px; right: 10px; z-index: 1001;
            background: rgba(0, 0, 0, 0.8); color: white; border: 1px solid #ff9800;
            padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px;
            cursor: pointer; text-transform: uppercase;
        }
        .gumb-povecaj:hover { background: #ff9800; color: black; }

        .barvni-izbirnik-posoda {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0, 0, 0, 0.8); padding: 5px 10px; border-radius: 4px;
            border: 1px solid #555; display: flex; align-items: center; gap: 8px; color: white; font-size: 11px;
        }
        .barvni-izbirnik-posoda select { background: #333; color: white; border: 1px solid #666; padding: 3px; font-size: 11px; border-radius: 3px; cursor: pointer; }

        .stalni-napis { background: rgba(0, 0, 0, 0.85); color: white; border: 1px solid #fff; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 12px; white-space: nowrap; }
        
        .gumb-kopiraj-popup {
            background: #ff9800; color: black; border: none; padding: 4px 8px;
            font-weight: bold; font-size: 11px; border-radius: 3px; cursor: pointer;
            margin-top: 5px; width: 100%; display: block; text-align: center; text-transform: uppercase;
        }
        .gumb-kopiraj-popup:hover { background: #e68a00; }

        @media print {
            body * { visibility: hidden; }
            #print-obmocje, #print-obmocje * { visibility: visible; }
            #print-obmocje { position: absolute; left: 0; top: 0; width: 100%; display: block !important; }
            #map-print-placeholder { width: 100% !important; height: 60vh !important; border: 1px solid #000; visibility: visible !important; }
            .leaflet-control-container { display: none !important; }
        }
        #print-obmocje { display: none; }
        .print-info-tabela { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .print-info-tabela td { padding: 10px; vertical-align: top; }
        .print-qr-container { text-align: right; width: 200px; }
        .print-qr-container img { width: 150px; height: 150px; }
    </style>
</head>
<body>

<div id="zaklep-zaslona">
    <div class="geslo-posoda">
        <h2>EPV Štab - Prijava</h2>
        <p style="font-size: 13px; color: #aaa; margin: 0;">Za dostop do sistema vpišite operativno geslo.</p>
        <input type="password" id="vnosno-geslo" placeholder="Vnesite geslo..." onkeydown="if(event.key === 'Enter') preveriGeslo()">
        <button onclick="preveriGeslo()">Potrdi prijava</button>
        <div class="napaka-tekst" id="napaka-geslo">Napačno geslo! Poskusite ponovno.</div>
    </div>
</div>

<div class="glavna-posoda">
    <div class="fullscreen-wrapper" id="map-wrapper">
        <button class="gumb-povecaj" onclick="preklopiCelZaslon('map-wrapper')">Cel zaslon</button>
        
        <div class="barvni-izbirnik-posoda">
            <label for="trenutnaBarva">Barva sektorja:</label>
            <select id="trenutnaBarva" onchange="posodobiNastavitveRisanja()">
                <option value="red" style="color:red; font-weight:bold;">Rdeča (Gasilci)</option>
                <option value="blue" style="color:cyan; font-weight:bold;">Modra (Vozila)</option>
                <option value="gold" style="color:yellow; font-weight:bold;">Rumena (Vodstvo)</option>
                <option value="green" style="color:lime; font-weight:bold;">Zelena (Reševalci)</option>
            </select>
        </div>

        <div id="zemljevid"></div>
    </div>
    
    <div id="desni-panel">
        <div class="tretjina-panela" id="panel-video">
            <button class="gumb-povecaj" onclick="preklopiCelZaslon('panel-video')">Cel zaslon</button>
            <h3 class="sekcija-naslov">Video Prenos (V ŽIVO)</h3>
            <div class="video-wrapper">
                <iframe src="https://vdo.ninja/?view=enota_epv_dron&autoplay=1&mute=1&hd=1&codec=h264" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>

        <div class="tretjina-panela" id="panel-enote">
            <button class="gumb-povecaj" onclick="preklopiCelZaslon('panel-enote')">Cel zaslon</button>
            <h3 class="sekcija-naslov">Spremljanje enot na mapi</h3>
            <div class="filter-posoda">
                <label>Aktivni dogodek / Intervencija:</label>
                <div class="filter-vrstica">
                    <select id="izbiraIntervencije" onchange="zamenjajIntervencijo(this.value)" style="width: 100%;">
                        <option value="">-- Brez aktivnega dogodka --</option>
                    </select>                    
                </div>
                <div class="filter-vrstica" style="margin-top: 5px;">                   
                    <input type="text" id="novoImeIntervencije" placeholder="Ime novega dogodka..." style="flex: 1;">
                    <button class="gumb-intervencija" onclick="ustvariNovDogodek()">Ustvari</button>
                </div>
                <div class="filter-vrstica" style="margin-top: 5px;">
                    <button id="gumbShraniSloje" class="gumb-intervencija" onclick="shraniSektorjeInMarkerje()" style="width: 100%; background-color: #4CAF50; color: white; border: none; font-weight: bold;">Shrani trenutno risbo</button>
                </div>
                <hr style="width:100%; border:0; border-top:1px solid #444; margin: 4px 0;">

                <label>Avtomatsko skrivanje starih sledi:</label>
                <div class="filter-vrstica">
                    <select id="filterTipCas" onchange="spremembaTipaFiltra()">
                        <option value="vse">Prikaži vse (Arhiv)</option>
                        <option value="ročno">Skrij neaktivne po minutah:</option>
                    </select>
                    <input type="number" id="filterMinute" value="15" min="1" oninput="shraniNastavitve()" style="display: none;">
                </div>
                
                <label style="margin-top: 3px;">Aktivne enote:</label>
                <div class="seznam-enot-okno" id="seznamEnotGumbi">
                    <div style="color: #aaa; font-style: italic; font-size: 11px; padding: 5px;">Čakanje na podatke...</div>
                </div>
            </div>
        </div>

        <div class="tretjina-panela" id="panel-qr">
            <button class="gumb-povecaj" onclick="preklopiCelZaslon('panel-qr')">Cel zaslon</button>
            <h3 class="sekcija-naslov">Generator QR kod za prijavu</h3>
            <div class="qr-generator-posoda">
                <select id="qrTip">
                    <option value="gasilec">Gasilec / Pešci (Rdeča ikona)</option>
                    <option value="vozilo">Vozilo / GVC / AC (Modra ikona)</option>
                    <option value="vodja">Vodstvo / Štab (Rumena ikona)</option>
                    <option value="resevalec">Drugi / Reševalci (Zelena ikona)</option>
                </select>
                <input type="number" id="qrClanov" value="3" min="1">
                <button class="gumb-qr" onclick="ustvariQrKodo()">Ustvari QR kodo</button>
                <div style="text-align: center;">
                    <div id="qr-izhod"></div>
                    <div id="qr-url-tekst"></div>
                </div>
                <button onclick="window.print()" style="width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; font-weight: bold;">🖨️ Natisni mapo in QR kodo</button>
            </div>
        </div>
    </div>
</div>

<div id="print-obmocje">
    <h1 id="print-naslov" style="font-family: Arial, sans-serif; margin-bottom: 10px;">Intervencija: ---</h1>
    <div id="map-print-placeholder"></div>
    <table class="print-info-tabela" style="font-family: Arial, sans-serif;">
        <tr>
            <td>
                <h3>PODATKI O DOGODKU:</h3>
                <p><strong>Datum tiskanja:</strong> <span id="print-datum"></span></p>
            </td>
            <td class="print-qr-container">
                <h3>QR KODA ZA DOSTOP:</h3>
                <div id="print-qr-slika"></div>
            </td>
        </tr>
    </table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // USKLAJENO Z VAŠIM APPS SCRIPTOM (Geslo: EPV2026)
    const PRAVILNO_GESLO_HASH = "8603900fdfbc2a9cfccf9e8d0ff0501d5b59d559577a65be787860b73b9c9756";
    let shranjenoPreverjenoGesloHash = "";

    let map, navadnaMapa, satelitskaMapa, katasterLayer;
    let izbranDogodekId = "Splošno";
    let vseIntervencije = ["Splošno"];
    let trenutnaIntervencija = "Splošno";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7BvUZXpXxZImcAB1hVLngMzHI3msWADQFcE1Tr0D4JnN2TO8Ug5nWzsbeTA1g/exec";
    const GESLO = PRAVILNO_GESLO_HASH;

    let enoteMarkerji = {};
    let enoteSledi = {}; 
    let ročnoSkriteEnote = {};
    const narisaniSektorjiSloj = new L.FeatureGroup();
    let drawControl;
    const slovarBarv = { "red": "Rdeča", "blue": "Modra", "gold": "Rumena", "green": "Zelena" };

    window.onload = function() {
        initMap();
        const shranjenHash = localStorage.getItem("shranjenoPreverjenoGesloHash");
        if (shranjenHash && shranjenHash.toLowerCase() === PRAVILNO_GESLO_HASH.toLowerCase()) {
            shranjenoPreverjenoGesloHash = shranjenHash;
            document.getElementById("zaklep-zaslona").style.display = "none";
            zagonPoPrijavi();
        }
    };

    function preveriGeslo() {
        const vnos = document.getElementById("vnosno-geslo").value.trim();
        const napakaElement = document.getElementById("napaka-geslo");
        
        // Dovolimo vpis navadnega gesla "EPV2026" ali pravilnega hasha
        let vnosHash = CryptoJS.SHA256(vnos).toString(CryptoJS.enc.Hex).toLowerCase();
        
        if (vnosHash === PRAVILNO_GESLO_HASH || vnos === "EPV2026") {
            shranjenoPreverjenoGesloHash = PRAVILNO_GESLO_HASH;
            document.getElementById("zaklep-zaslona").style.display = "none";
            localStorage.setItem("shranjenoPreverjenoGesloHash", PRAVILNO_GESLO_HASH);
            zagonPoPrijavi();
        } else {
            if (napakaElement) napakaElement.style.display = "block";
            document.getElementById("vnosno-geslo").value = "";
        }
    }

    function zagonPoPrijavi() {
        setTimeout(() => { if (map) map.invalidateSize(); }, 200);
        naloziIntervencije();
        izrisiSektorjeZaTrenutnoIntervencijo();
        naloziNastavitev();
        ustvariQrKodo();
        osveziSeznamDogodkov();
        osveziZemljevid();
        setInterval(osveziZemljevid, 5000);
    }

    function initMap() {
        navadnaMapa = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        satelitskaMapa = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        
        map = L.map('zemljevid', { center: [46.3925, 15.5727], zoom: 15, layers: [satelitskaMapa] });
        L.control.layers({ "Satelit": satelitskaMapa, "Ceste": navadnaMapa }, null, { position: 'bottomright' }).addTo(map);
        map.addLayer(narisaniSektorjiSloj);
        posodobiNastavitveRisanja();
    }

    // Pomožna funkcija za varno CORS/Proxy nalaganje podatkov iz Googla
    function jsonpFetch(url, params, callbackName, successCallback) {
        const polniUrl = url + (url.includes('?') ? '&' : '?') + new URLSearchParams(params).toString();
        
        // Ker Google ne podpira JSONP izvorno, bomo prebrali CORS napako in uporabili javni proxy ALLORIGINS, če direktni fetch spodleti
        fetch(polniUrl)
            .then(r => r.json())
            .then(data => successCallback(data))
            .catch(() => {
                // Če brskalnik blokira CORS, pretvorimo zahtevek preko proxy-ja
                fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(polniUrl)}`)
                    .then(res => { if (res.ok) return res.json(); throw new Error('Proxy error'); })
                    .then(wrapper => successCallback(JSON.parse(wrapper.contents)))
                    .catch(e => console.error("Kritična napaka pri pridobivanju podatkov:", e));
            });
    }

    function osveziZemljevid() {
        if (!shranjenoPreverjenoGesloHash) return;
        
        jsonpFetch(SCRIPT_URL, { geslo: shranjenoPreverjenoGesloHash }, 'cb_map', function(odgovorJson) {
            if (odgovorJson.status === "error") return;
            procesirajPodatkeZemljevida(odgovorJson.data || []);
        });
    }

    function procesirajPodatkeZemljevida(matriksaPodatkov) {
        let zgodovinaPoti = {}, zadnjeLokacije = {}, naborVsehEnot = new Set();
        const filterTip = document.getElementById("filterTipCas").value;
        const filterMinut = parseInt(document.getElementById("filterMinute").value) || 15;
        const trenutniCasMs = new Date().getTime();

        for (let i = 1; i < matriksaPodatkov.length; i++) {
            const vrstica = matriksaPodatkov[i];
            if (vrstica.length < 5) continue;

            const cas = vrstica[0];
            let surovaEnota = String(vrstica[1]).trim();
            const lat = parseFloat(String(vrstica[2]).replace(',', '.'));
            const lon = parseFloat(String(vrstica[3]).replace(',', '.'));
            const natancnost = String(vrstica[4]).trim();

            if (isNaN(lat) || isNaN(lon)) continue;

            let tip = "gasilec", ime = surovaEnota, clanov = "1";
            if (surovaEnota.includes(":")) {
                const deli = surovaEnota.split(":");
                tip = deli[0].toLowerCase(); ime = deli[1]; clanov = deli[2] || "1";
            } else {
                if (/[vV]odja|[pP]oveljnik|[eE]pv|[šŠ]tab/.test(surovaEnota)) tip = "vodja";
                if (/[vV]ozilo|[gG]vc|[aA]c/.test(surovaEnota)) tip = "vozilo";
            }

            naborVsehEnot.add(ime);
            if (ročnoSkriteEnote[ime] === true) continue;

            if (filterTip === "ročno") {
                const starostMinut = (trenutniCasMs - pretvoriVCas(cas).getTime()) / 60000;
                if (starostMinut > filterMinut) continue;
            }

            if (!zgodovinaPoti[ime]) zgodovinaPoti[ime] = [];
            zgodovinaPoti[ime].push([lat, lon]);
            zadnjeLokacije[ime] = { lat, lon, cas, natancnost, tip, clanov };
        }

        const seznamPanel = document.getElementById("seznamEnotGumbi");
        if(seznamPanel) {
            let seznamHtml = "";
            Array.from(naborVsehEnot).sort().forEach(imeE => {
                seznamHtml += `<div class="enota-stikalo"><span>${imeE}</span><input type="checkbox" ${!ročnoSkriteEnote[imeE]?'checked':''} onchange="preklopiEnoto('${imeE}', this.checked)"></div>`;
            });
            if(seznamHtml) seznamPanel.innerHTML = seznamHtml;
        }

        for (const ime in enoteSledi) { if (!zgodovinaPoti[ime]) { map.removeLayer(enoteSledi[ime]); delete enoteSledi[ime]; } }
        for (const [ime, koordinate] of Object.entries(zgodovinaPoti)) {
            let barva = (zadnjeLokacije[ime].tip==="vozilo")?"#1976d2":(zadnjeLokacije[ime].tip==="vodja")?"#fbc02d":(zadnjeLokacije[ime].tip==="resevalec")?"#388e3c":"#d32f2f";
            if (enoteSledi[ime]) enoteSledi[ime].setLatLngs(koordinate);
            else enoteSledi[ime] = L.polyline(koordinate, { color: barva, weight: 3, opacity: 0.6 }).addTo(map);
        }

        for (const ime in enoteMarkerji) { if (!zadnjeLokacije[ime]) { map.removeLayer(enoteMarkerji[ime]); delete enoteMarkerji[ime]; } }
        for (const [ime, lok] of Object.entries(zadnjeLokacije)) {
            let bMarker = (lok.tip==="vozilo")?"blue":(lok.tip==="vodja")?"gold":(lok.tip==="resevalec")?"green":"red";
            let txt = `<b>${ime}</b><br>Članov: ${lok.clanov}<br>GPS: ${lok.cas}`;
            if (enoteMarkerji[ime]) {
                enoteMarkerji[ime].setLatLng([lok.lat, lok.lon]).setIcon(ustvariIkono(bMarker)).getPopup().setContent(txt);
            } else {
                enoteMarkerji[ime] = L.marker([lok.lat, lok.lon], { icon: ustvariIkono(bMarker) }).addTo(map).bindPopup(txt);
                enoteMarkerji[ime].bindTooltip(ime, { permanent: true, direction: 'top', offset: [0, -40], className: 'stalni-napis' });
            }
        }
    }

    function osveziSeznamDogodkov() {
        jsonpFetch(SCRIPT_URL, { akcija: "pridobiSeznamDogodkov", geslo: GESLO }, 'cb_list', function(odgovor) {
            if (odgovor.status === "success" && odgovor.data) {
                vseIntervencije = [...new Set([...vseIntervencije, ...odgovor.data])];
                localStorage.setItem("epv_intervencije_seznam", JSON.stringify(vseIntervencije));
                izrisiSpustniSeznamZgodovine();
            }
        });
    }

    function naloziElementeDogodka(dogodekId) {
        izbranDogodekId = dogodekId;
        narisaniSektorjiSloj.clearLayers();
        if (!dogodekId) return;

        jsonpFetch(SCRIPT_URL, { akcija: "pridobiDogodke", dogodek: dogodekId, geslo: GESLO }, 'cb_elem', function(odgovor) {
            if (odgovor.status === "success" && odgovor.data) {
                odgovor.data.forEach(element => {
                    L.geoJSON(element.podatki, {
                        onEachFeature: function(feature, layer) {
                            let b = feature.properties?.epvBarva || "red";
                            layer.options.epvBarva = b;
                            layer.setStyle(pridobiNastavitveStila(b));
                            urediPopupZaSektor(layer, b);
                            narisaniSektorjiSloj.addLayer(layer);
                        }
                    });
                });
                if (narisaniSektorjiSloj.getLayers().length > 0) map.fitBounds(narisaniSektorjiSloj.getBounds());
            }
        });
    }

    function shraniSektorjeInMarkerje() {
        if (!izbranDogodekId || izbranDogodekId === "Splošno") {
            alert("Ustvarite ali izberite specifičen dogodek!"); return;
        }
        shraniSektorjeVTekočoIntervencijo();

        const sektorjiZaVnos = [];
        narisaniSektorjiSloj.eachLayer(layer => {
            let tip = (layer instanceof L.Marker)?"marker":(layer instanceof L.Polygon)?"polygon":(layer instanceof L.Polyline)?"polyline":(layer instanceof L.Circle)?"circle":"";
            if (tip) {
                let gj = layer.toGeoJSON();
                gj.properties = gj.properties || {};
                gj.properties.epvBarva = layer.options.epvBarva || "red";
                sektorjiZaVnos.push({ tip: tip, geojson: gj });
            }
        });

        const gumb = document.getElementById("gumbShraniSloje");
        gumb.disabled = true; gumb.textContent = "Shranjevanje...";

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ geslo: GESLO, akcija: "shraniSektorje", dogodek: izbranDogodekId, sektorji: sektorjiZaVnos })
        }).then(() => {
            alert("Elementi so uspešno shranjeni!");
            gumb.disabled = false; gumb.textContent = "Shrani trenutno risbo";
            osveziSeznamDogodkov();
        });
    }

    function zamenjajIntervencijo(dogodekId) {
        trenutnaIntervencija = dogodekId; izbranDogodekId = dogodekId;
        localStorage.setItem("epv_intervencije_trenutna", trenutnaIntervencija);
        izrisiSektorjeZaTrenutnoIntervencijo();
        naloziElementeDogodka(dogodekId);
    }

    function shraniSektorjeVTekočoIntervencijo() {
        const podatki = [];
        narisaniSektorjiSloj.eachLayer(layer => {
            let gj = layer.toGeoJSON(); gj.properties = gj.properties || {};
            gj.properties.epvBarva = layer.options.epvBarva || "red";
            podatki.push(gj);
        });
        localStorage.setItem("epv_sektorji_" + trenutnaIntervencija, JSON.stringify(podatki));
    }

    function izrisiSektorjeZaTrenutnoIntervencijo() {
        narisaniSektorjiSloj.clearLayers();
        const shranjeno = localStorage.getItem("epv_sektorji_" + trenutnaIntervencija);
        if (!shranjeno) return;
        JSON.parse(shranjeno).forEach(gj => {
            let b = gj.properties?.epvBarva || "red";
            let l = L.geoJSON(gj, { style: pridobiNastavitveStila(b) }).getLayers()[0];
            if (l) { l.options.epvBarva = b; urediPopupZaSektor(l, b); narisaniSektorjiSloj.addLayer(l); }
        });
    }

    function pridobiNastavitveStila(barva) {
        let h = barva==="blue"?"#1976d2":barva==="gold"?"#fbc02d":barva==="green"?"#388e3c":"#d32f2f";
        return { color: h, weight: 3, opacity: 0.8, fillColor: h, fillOpacity: 0.35 };
    }

    function posodobiNastavitveRisanja() {
        const b = document.getElementById("trenutnaBarva").value;
        const s = pridobiNastavitveStila(b);
        if (drawControl) map.removeControl(drawControl);
        drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: { polygon: { shapeOptions: s }, polyline: { shapeOptions: {color: s.color, weight:4} }, rectangle: { shapeOptions: s }, circle: { shapeOptions: s }, marker: true, circlemarker: false },
            edit: { featureGroup: narisaniSektorjiSloj }
        });
        map.addControl(drawControl);
    }

    if (map) {
        map.on(L.Draw.Event.CREATED, e => {
            let l = e.layer; let b = document.getElementById("trenutnaBarva").value;
            l.options.epvBarva = b; urediPopupZaSektor(l, b); narisaniSektorjiSloj.addLayer(l);
            shraniSektorjeVTekočoIntervencijo(); l.openPopup();
        });
        map.on(L.Draw.Event.EDITED, () => shraniSektorjeVTekočoIntervencijo());
        map.on(L.Draw.Event.DELETED, () => shraniSektorjeVTekočoIntervencijo());
    }

    function urediPopupZaSektor(layer, b) {
        let ll = (layer instanceof L.Marker || layer instanceof L.Circle)? layer.getLatLng() : layer.getBounds().getCenter();
        let ctxt = `${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}`;
        layer.bindPopup(`<div style="font-size:12px;"><b>Sektor (${slovarBarv[b]})</b><br>Koordinate: ${ctxt}<br><button class="gumb-kopiraj-popup" onclick="navigator.clipboard.writeText('${ctxt}'); alert('Kopirano!');">Kopiraj</button></div>`);
    }

    function ustvariNovDogodek() {
        const v = document.getElementById("novoImeIntervencije").value.trim();
        if (!v) return;
        izbranDogodekId = v; trenutnaIntervencija = v;
        if (!vseIntervencije.includes(v)) { vseIntervencije.push(v); localStorage.setItem("epv_intervencije_seznam", JSON.stringify(vseIntervencije)); }
        localStorage.setItem("epv_intervencije_trenutna", v);
        izrisiSpustniSeznamZgodovine();
        document.getElementById("novoImeIntervencije").value = "";
        narisaniSektorjiSloj.clearLayers();
    }

    function izrisiSpustniSeznamZgodovine() {
        const s = document.getElementById("izbiraIntervencije"); if (!s) return;
        s.innerHTML = '<option value="">-- Brez aktivnega dogodka --</option>';
        [...new Set(vseIntervencije)].forEach(d => {
            if(d) s.innerHTML += `<option value="${d}" ${d===izbranDogodekId?'selected':''}>${d}</option>`;
        });
    }

    function pretvoriVCas(suroviCas) {
        let d = new Date(suroviCas); return isNaN(d.getTime()) ? new Date() : d;
    }
    function preklopiEnoto(i, v) { ročnoSkriteEnote[i] = !v; shraniNastavitve(); }
    function spremembaTipaFiltra() { document.getElementById("filterMinute").style.display = (document.getElementById("filterTipCas").value==="ročno")?"block":"none"; shraniNastavitve(); }
    function shraniNastavitve() { localStorage.setItem("epv_filter_tip", document.getElementById("filterTipCas").value); localStorage.setItem("epv_filter_min", document.getElementById("filterMinute").value); localStorage.setItem("epv_skrite_enote", JSON.stringify(ročnoSkriteEnote)); osveziZemljevid(); }
    function naloziNastavitev() { let t=localStorage.getItem("epv_filter_tip"), m=localStorage.getItem("epv_filter_min"), s=localStorage.getItem("epv_skrite_enote"); if(t) document.getElementById("filterTipCas").value=t; if(m) document.getElementById("filterMinute").value=m; if(s) ročnoSkriteEnote=JSON.parse(s); spremembaTipaFiltra(); }
    function preklopiCelZaslon(id) { let e=document.getElementById(id); if(!document.fullscreenElement) e.requestFullscreen(); else document.exitFullscreen(); }
    function ustvariIkono(b) { return L.icon({ iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${b}.png`, shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize:[25,41], iconAnchor:[12,41], popupAnchor:[1,-34], shadowSize:[41,41] }); }
    function naloziIntervencije() { let s=localStorage.getItem("epv_intervencije_seznam"), t=localStorage.getItem("epv_intervencije_trenutna"); if(s) vseIntervencije=JSON.parse(s); if(t) { trenutnaIntervencija=t; izbranDogodekId=t; } izrisiSpustniSeznamZgodovine(); }
    function ustvariQrKodo() {
        const t = document.getElementById('qrTip').value, c = document.getElementById('qrClanov').value;
        const url = `https://gzsbpov.github.io/enota-EPV/terenEPV.html?tip=${t}&clanov=${c}`;
        document.getElementById("qr-izhod").innerHTML = ""; document.getElementById("qr-url-tekst").innerText = url;
        new QRCode(document.getElementById("qr-izhod"), { text: url, width: 110, height: 110 });
    }
</script>
</body>
</html>
