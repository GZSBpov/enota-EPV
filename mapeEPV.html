<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPV Štabni Nadzor & QR Generator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; background: #111; }
        .glavna-posoda { display: flex; width: 100%; height: 100%; transition: all 0.3s ease; }
        
        #zemljevid-kontejner { flex: 2; height: 100%; position: relative; display: flex; flex-direction: column; transition: all 0.3s ease; }
        #zemljevid { flex-grow: 1; width: 100%; }
        
        #stranski-panel { flex: 1; height: 100%; background: #222; display: flex; flex-direction: column; border-left: 3px solid #444; overflow-y: auto; transition: all 0.3s ease; }
        
        .sekcija-naslov { color: white; background: #111; padding: 10px; margin: 0; text-align: center; font-size: 16px; border-bottom: 1px solid #333; position: relative; }
        .video-kontejner { height: 35%; min-height: 200px; width: 100%; background: #000; position: relative; transition: all 0.3s ease; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .gumb-povecaj {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #d32f2f;
            color: white;
            border: none;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            z-index: 2000;
        }
        .gumb-povecaj:hover { background: #b71c1c; }

        .maksimiran-zemljevid #stranski-panel { display: none !important; }
        .maksimiran-zemljevid #zemljevid-kontejner { flex: 1 1 100%; width: 100%; height: 100%; }
        
        .maksimiran-video #zemljevid-kontejner { display: none !important; }
        .maksimiran-video #stranski-panel { flex: 1 1 100%; border-left: none; }
        .maksimiran-video .video-kontejner { height: 90vh; }
        .maksimiran-video .qr-posoda, .maksimiran-video h3:not(.video-naslov) { display: none !important; }

        .qr-posoda { padding: 15px; color: white; display: flex; flex-direction: column; align-items: center; background: #2a2a2a; border-top: 2px solid #444; flex-grow: 1; }
        .qr-posoda label { align-self: flex-start; margin: 5px 0; font-size: 13px; color: #ccc; }
        .qr-posoda select, .qr-posoda input, .qr-posoda button { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #555; background: #444; color: white; font-size: 14px; box-sizing: border-box; }
        .qr-posoda button { background: #d32f2f; font-weight: bold; cursor: pointer; border: none; margin-top: 5px; }
        .qr-posoda button:hover { background: #b71c1c; }
        #qr-izpis { background: white; padding: 10px; margin-top: 10px; border-radius: 4px; display: none; }
        
        .stalni-napis { background: rgba(0, 0, 0, 0.85); color: white; border: 1px solid #fff; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 12px; white-space: nowrap; }
        
        /* Stil za gumb za brisanje znotraj marker oblačka */
        .gumb-odjava-enote {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 5px 10px;
            margin-top: 8px;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .gumb-odjava-enote:hover { background: #b71c1c; }
    </style>
</head>
<body>

<div class="glavna-posoda" id="glavno-okno">
    <div id="zemljevid-kontejner">
        <button class="gumb-povecaj" onclick="preklopiZemljevidFullScreen()">[ ] Celozaslonski prikaz</button>
        <div id="zemljevid"></div>
    </div>
    
    <div id="stranski-panel">
        <h3 class="sekcija-naslov video-naslov">
            Video Prenos (V ŽIVO)
            <button class="gumb-povecaj" onclick="preklopiVideoFullScreen()">[ ] Povečaj video</button>
        </h3>
        <div class="video-kontejner" id="video-sekcija">
            <!-- TUKAJ ZAMENJAŠ POVEZAVO: Trenutno nastavljeno na YouTube, lahko pa prilepiš VDO.ninja ali lokalni stream -->
            <iframe src="https://www.youtube.com/embed/live_stream?channel=TVOJ_YOUTUBE_CHANNEL_ID" allowfullscreen></iframe>
        </div>
        
        <h3 class="sekcija-naslov">Generator QR kod za terensko prijavo</h3>
        <div class="qr-posoda">
            <label for="qr-tip">Tip enote na terenu:</label>
            <select id="qr-tip" onchange="posodobiQR()">
                <option value="gasilec">Gasilec / Pešci (Rdeča ikona)</option>
                <option value="vozilo">Vozilo / GVC / AC (Modra ikona)</option>
                <option value="vodja">Vodstvo / Štab / EPV (Rumena ikona)</option>
                <option value="resevalec">Reševalec / NMP (Zelena ikona)</option>
            </select>
            
            <label for="qr-clani">Število članov v tej ekipi:</label>
            <input type="number" id="qr-clani" value="3" min="1" oninput="posodobiQR()">
            
            <button onclick="generirajInPrikaziQR()">USTVARI QR KODO ZA SKENIRANJE</button>
            
            <div id="qr-izpis"></div>
            <p id="qr-url-tekst" style="font-size: 11px; color: #aaa; word-break: break-all; margin-top: 8px; text-align: center;"></p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNdPEQjxMFttBgz1_h87RP6SEBjvaELdFth-28Q2HkEPBO08BWsFKQtMyav0SIhaq16w/exec";
    const JAVNI_TEREN_URL = "https://tvoja-stran.github.io/terenEPV.html";

    const map = L.map('zemljevid').setView([46.3925, 15.5727], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

    let enoteMarkerji = {};
    let enoteSledi = {}; 
    let skriteEnote = []; // Seznam enot, ki jih je štab ročno odstranil
    let qrObjekt = null;

    // --- FULLSCREEN LOGIKA ---
    const glavnoOkno = document.getElementById('glavno-okno');

    function preklopiZemljevidFullScreen() {
        if (glavnoOkno.classList.contains('maksimiran-zemljevid')) {
            ponastaviPrikaz();
        } else {
            ponastaviPrikaz();
            glavnoOkno.classList.add('maksimiran-zemljevid');
            setTimeout(() => { map.invalidateSize(); }, 300);
        }
    }

    function preklopiVideoFullScreen() {
        if (glavnoOkno.classList.contains('maksimiran-video')) {
            ponastaviPrikaz();
        } else {
            ponastaviPrikaz();
            glavnoOkno.classList.add('maksimiran-video');
        }
    }

    function ponastaviPrikaz() {
        glavnoOkno.classList.remove('maksimiran-zemljevid');
        glavnoOkno.classList.remove('maksimiran-video');
        setTimeout(() => { map.invalidateSize(); }, 300);
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape" || event.keyCode === 27) {
            ponastaviPrikaz();
        }
    });

    // --- ŠTABNA ODJAVA / BRISANJE ENOTE ---
    function odstraniEnotoIzStaba(ime) {
        if (confirm(`Ali res želiš odstraniti enoto ${ime} z zemljevida?`)) {
            // Dodaj na seznam skritih enot
            skriteEnote.push(ime);
            
            // Odstrani marker z zemljevida
            if (enoteMarkerji[ime]) {
                map.removeLayer(enoteMarkerji[ime]);
                delete enoteMarkerji[ime];
            }
            // Odstrani sled (črto) z zemljevida
            if (enoteSledi[ime]) {
                map.removeLayer(enoteSledi[ime]);
                delete enoteSledi[ime];
            }
        }
    }

    // --- QR GENERATOR ---
    function generirajInPrikaziQR() {
        const tip = document.getElementById('qr-tip').value;
        const clani = document.getElementById('qr-clani').value;
        const koncniUrl = `${JAVNI_TEREN_URL}?tip=${tip}&clanov=${clani}`;
        
        document.getElementById('qr-izpis').style.display = "block";
        document.getElementById('qr-izpis').innerHTML = ""; 
        document.getElementById('qr-url-tekst').innerText = koncniUrl;

        qrObjekt = new QRCode(document.getElementById('qr-izpis'), {
            text: koncniUrl, width: 180, height: 180, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });
    }

    function posodobiQR() {
        if(document.getElementById('qr-izpis').style.display === "block") {
            generirajInPrikaziQR();
        }
    }

    function ustvariIkono(barva) {
        let url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png";
        if (barva === "blue") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png";
        if (barva === "gold") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png";
        if (barva === "green") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png";

        return L.icon({
            iconUrl: url, shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
    }

    // --- OSVEŽEVANJE ZEMLJEVIDA ---
    async function osveziZemljevid() {
        try {
            const response = await fetch(SCRIPT_URL);
            const matriksaPodatkov = await response.json();
            if (matriksaPodatkov.status === "error") return;

            let zgodovinaPoti = {};
            let zadnjeLokacije = {};

            for (let i = 1; i < matriksaPodatkov.length; i++) {
                const vrstica = matriksaPodatkov[i];
                if (vrstica.length < 5) continue;

                const cas = vrstica[0];
                let surovaEnota = String(vrstica[1]).trim();
                const lat = parseFloat(String(vrstica[2]).replace(',', '.'));
                const lon = parseFloat(String(vrstica[3]).replace(',', '.'));
                const natancnost = String(vrstica[4]).trim();

                if (isNaN(lat) || isNaN(lon)) continue;

                let tip = "gasilec";
                let ime = surovaEnota;
                let clanov = "1";

                if (surovaEnota.includes(":")) {
                    const deli = surovaEnota.split(":");
                    tip = deli[0].toLowerCase();
                    ime = deli[1];
                    clanov = deli[2] || "1";
                } else {
                    if (surovaEnota.toLowerCase().includes("vodja") || surovaEnota.toLowerCase().includes("poveljnik") || surovaEnota.toLowerCase().includes("epv") || surovaEnota.toLowerCase().includes("štab")) tip = "vodja";
                    if (surovaEnota.toLowerCase().includes("vozilo") || surovaEnota.toLowerCase().includes("gvc") || surovaEnota.toLowerCase().includes("ac")) tip = "vozilo";
                }

                // Preskoči obdelavo, če je štab to enoto ročno skril
                if (skriteEnote.includes(ime)) continue;

                if (!zgodovinaPoti[ime]) zgodovinaPoti[ime] = [];
                zgodovinaPoti[ime].push([lat, lon]);

                zadnjeLokacije[ime] = { lat, lon, cas, natancnost, tip, clanov };
            }

            // Risanje poti
            for (const [ime, koordinate] of Object.entries(zgodovinaPoti)) {
                let barvaCrte = "#d32f2f"; 
                let tip = zadnjeLokacije[ime].tip;
                if (tip === "vozilo") barvaCrte = "#1976d2";
                if (tip === "vodja") barvaCrte = "#fbc02d";
                if (tip === "resevalec") barvaCrte = "#388e3c";

                if (enoteSledi[ime]) {
                    enoteSledi[ime].setLatLngs(koordinate);
                } else {
                    enoteSledi[ime] = L.polyline(koordinate, { color: barvaCrte, weight: 3, opacity: 0.6 }).addTo(map);
                }
            }

            // Izris markerjev
            for (const [ime, lok] of Object.entries(zadnjeLokacije)) {
                let barvaMarkerja = "red";
                if (lok.tip === "vozilo") barvaMarkerja = "blue";
                if (lok.tip === "vodja") barvaMarkerja = "gold";
                if (lok.tip === "resevalec") barvaMarkerja = "green";

                let prikazniNapis = ime;
                if (lok.tip === "gasilec") {
                    prikazniNapis = `${ime} (${lok.clanov})`;
                }

                // V tekst oblačku dodamo gumb za ročno odjavo enote
                const podrobnostiTekst = `
                    <b>${ime}</b> (${lok.tip.toUpperCase()})<br>
                    Članov: ${lok.clanov}<br>
                    Zadnji GPS: ${lok.cas}<br>
                    Natančnost: ${lok.natancnost} m<br>
                    <button class="gumb-odjava-enote" onclick="odstraniEnotoIzStaba('${ime}')">Skrij enoto</button>
                `;

                if (enoteMarkerji[ime]) {
                    enoteMarkerji[ime].setLatLng([lok.lat, lok.lon]);
                    enoteMarkerji[ime].setIcon(ustvariIkono(barvaMarkerja));
                    enoteMarkerji[ime].getPopup().setContent(podrobnostiTekst);
                    enoteMarkerji[ime].setTooltipContent(prikazniNapis);
                } else {
                    let noviMarker = L.marker([lok.lat, lok.lon], { icon: ustvariIkono(barvaMarkerja) })
                        .addTo(map)
                        .bindPopup(podrobnostiTekst);

                    noviMarker.bindTooltip(prikazniNapis, {
                        permanent: true, direction: 'top', offset: [0, -40], className: 'stalni-napis'
                    }).openTooltip();

                    enoteMarkerji[ime] = noviMarker;
                }
            }
        } catch (error) {
            console.error("Napaka na zemljevidu:", error);
        }
    }

    osveziZemljevid();
    setInterval(osveziZemljevid, 5000);
</script>
</body>
</html>
