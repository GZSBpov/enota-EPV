<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPV Štabni Zemljevid & Sledenje</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- NOVO: Leaflet.draw CSS za risalna orodja -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <!-- Knjižnica za generiranje QR kod na strani -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; background: #222; }
        .glavna-posoda { display: flex; width: 100%; height: 100%; }
        
        /* Posode z gumbom za celozaslonski način */
        .fullscreen-wrapper { position: relative; flex: 2; height: 100%; }
        #zemljevid { width: 100%; height: 100%; }
        
        /* Desni panel razdeljen na 3 enake fiksne dele */
        #desni-panel { flex: 1; height: 100%; background: #222; display: flex; flex-direction: column; border-left: 3px solid #444; color: white; }
        .tretjina-panela { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid #444; }
        .tretjina-panela:last-child { border-bottom: none; }
        
        .sekcija-naslov { color: white; background: #111; padding: 8px; margin: 0; text-align: center; font-size: 14px; border-bottom: 1px solid #444; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Zgornja tretjina: Video */
        .video-wrapper { position: relative; width: 100%; flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Srednja tretjina: Filtri in kljukice */
        .filter-posoda { padding: 10px 15px; background: #1b1b1b; flex: 1; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
        .filter-posoda label { font-size: 12px; font-weight: bold; color: #ff9800; }
        .filter-vrstica { display: flex; gap: 10px; align-items: center; }
        .filter-posoda select, .filter-posoda input[type="number"], .filter-posoda input[type="text"] { padding: 6px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 12px; }
        .filter-posoda input[type="number"] { width: 60px; }
        .gumb-intervencija { background: #ff9800; color: black; font-weight: bold; padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .gumb-intervencija:hover { background: #e68a00; }
        
        /* Seznam enot */
        .seznam-enot-okno { flex: 1; overflow-y: auto; background: #252525; padding: 6px; border-radius: 4px; border: 1px solid #444; margin-top: 2px; }
        .enota-stikalo { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px; font-size: 12px; border-bottom: 1px solid #333; }
        .enota-stikalo:last-child { border-bottom: none; }
        .enota-stikalo input { cursor: pointer; transform: scale(1.1); }

        /* Spodnja tretjina: QR Generator */
        .qr-generator-posoda { padding: 10px 15px; display: flex; flex-direction: column; gap: 6px; background: #2a2a2a; flex: 1; overflow-y: auto; }
        .qr-generator-posoda label { font-size: 12px; font-weight: bold; color: #ddd; }
        .qr-generator-posoda select, .qr-generator-posoda input { padding: 6px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 12px; }
        .gumb-qr { background: #e53935; color: white; font-weight: bold; padding: 8px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .gumb-qr:hover { background: #b71c1c; }
        #qr-izhod { margin: 5px auto; padding: 6px; background: white; border-radius: 4px; display: inline-block; }
        #qr-izhod img { width: 110px !important; height: 110px !important; }
        #qr-url-tekst { font-size: 10px; color: #aaa; text-align: center; word-break: break-all; margin-top: 2px; padding: 0 5px; }

        /* Gumbi za povečavo čez cel zaslon */
        .gumb-povecaj {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid #fff;
            padding: 6px 10px; font-size: 11px; font-weight: bold; border-radius: 4px;
            cursor: pointer; text-transform: uppercase;
        }
        .gumb-povecaj:hover { background: rgb(0, 0, 0); }

        /* NOVO: Izbirnik barve za risanje sektorjev (zgoraj levo na mapi) */
        .barvni-izbirnik-posoda {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0, 0, 0, 0.8); padding: 5px 10px; border-radius: 4px;
            border: 1px solid #555; display: flex; align-items: center; gap: 8px; color: white; font-size: 11px;
        }
        .barvni-izbirnik-posoda select { background: #333; color: white; border: 1px solid #666; padding: 3px; font-size: 11px; border-radius: 3px; cursor: pointer; }

        .stalni-napis { background: rgba(0, 0, 0, 0.85); color: white; border: 1px solid #fff; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 12px; white-space: nowrap; }
        
        /* Gumb za kopiranje znotraj oblačka na zemljevidu */
        .gumb-kopiraj-popup {
            background: #ff9800; color: black; border: none; padding: 4px 8px;
            font-weight: bold; font-size: 11px; border-radius: 3px; cursor: pointer;
            margin-top: 5px; width: 100%; display: block; text-align: center; text-transform: uppercase;
        }
        .gumb-kopiraj-popup:hover { background: #e68a00; }

        :fullscreen .gumb-povecaj { background: rgba(229, 57, 53, 0.9); }
    </style>
</head>
<body>

<div class="glavna-posoda">
    <!-- Levi del: Karta z gumbom za cel zaslon in risalnimi orodji -->
    <div class="fullscreen-wrapper" id="map-wrapper">
        <button class="gumb-povecaj" onclick="preklopiCelZaslon('map-wrapper')">Cel zaslon (ESC)</button>
        
        <!-- NOVO: Kontrolnik za izbiro trenutne aktivne barve sektorja -->
        <div class="barvni-izbirnik-posoda">
            <label for="trenutnaBarva">Barva sektorja:</label>
            <select id="trenutnaBarva" onchange="posodobiNastavitveRisanja()">
                <option value="red" style="color:red; font-weight:bold;">Rdeča (Gasilci)</option>
                <option value="blue" style="color:cyan; font-weight:bold;">Modra (Vozila)</option>
                <option value="gold" style="color:yellow; font-weight:bold;">Rumena (Vodstvo)</option>
                <option value="green" style="color:lime; font-weight:bold;">Zelena (Reševalci)</option>
            </select>
        </div>

        <div id="zemljevid"></div>
    </div>
    
    <!-- Desni del: Razdeljen na 3 funkcionalne tretjine -->
    <div id="desni-panel">
        
        <!-- 1. ZGORNJA TRETJINA: Video prenos -->
        <div class="tretjina-panela">
            <h3 class="sekcija-naslov">Video Prenos (V ŽIVO)</h3>
            <div class="video-wrapper" id="video-wrapper">
                <button class="gumb-povecaj" onclick="preklopiCelZaslon('video-wrapper')">Cel zaslon (ESC)</button>
                <!-- Video prenos iz drona s FIKSNIM ID-jem (ni več vpisovanja) -->
                <iframe 
                  src="https://vdo.ninja/?view=enota_epv_dron&autoplay=1&mute=1&hd=1&codec=h264" 
                  style="width: 100%; height: 100%; border: none;" 
                  allow="autoplay; encrypted-media; picture-in-picture" 
                  allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- 2. SREDNJA TRETJINA: Filtri in kljukice za spremljanje -->
        <div class="tretjina-panela">
            <h3 class="sekcija-naslov">Spremljanje enot na mapi</h3>
            <div class="filter-posoda">
                
                <!-- NOVO: Izbira in kreiranje intervencij/dogodkov -->
                <label>Aktivni dogodek / Intervencija:</label>
                <div class="filter-vrstica">
                    <select id="izbiraIntervencije" onchange="zamenjajIntervencijo()" style="flex: 1;"></select>
                </div>
                <div class="filter-vrstica">
                    <input type="text" id="novoImeIntervencije" placeholder="Ime novega dogodka..." style="flex: 1;">
                    <button class="gumb-intervencija" onclick="ustvariIntervencijo()">Ustvari</button>
                </div>
                <hr style="width:100%; border:0; border-top:1px solid #444; margin: 4px 0;">

                <label>Avtomatsko skrivanje starih sledi:</label>
                <div class="filter-vrstica">
                    <select id="filterTipCas" onchange="spremembaTipaFiltra()">
                        <option value="vse">Prikaži vse (Arhiv za analizo)</option>
                        <option value="ročno">Skrij neaktivne po minutah:</option>
                    </select>
                    <input type="number" id="filterMinute" value="15" min="1" oninput="shraniNastavitve()" style="display: none;">
                </div>
                
                <label style="margin-top: 3px;">Aktivne enote (odznačite za skritje):</label>
                <div class="seznam-enot-okno" id="seznamEnotGumbi">
                    <div style="color: #aaa; font-style: italic; font-size: 11px; padding: 5px;">Čakanje na podatke...</div>
                </div>
            </div>
        </div>

        <!-- 3. SPODNJA TRETJINA: Generator QR kod -->
        <div class="tretjina-panela">
            <h3 class="sekcija-naslov">Generator QR kod za prijavu</h3>
            <div class="qr-generator-posoda">
                <label for="qrTip">Tip enote na terenu:</label>
                <select id="qrTip">
                    <option value="gasilec">Gasilec / Pešci (Rdeča ikona)</option>
                    <option value="vozilo">Vozilo / GVC / AC (Modra ikona)</option>
                    <option value="vodja">Vodstvo / Štab / Poveljnik (Rumena ikona)</option>
                    <option value="resevalec">Drugi / Reševalci / NMP (Zelena ikona)</option>
                </select>

                <label for="qrClanov">Število članov v ekipi:</label>
                <input type="number" id="qrClanov" value="3" min="1">

                <button class="gumb-qr" onclick="ustvariQrKodo()">Ustvari QR kodo</button>
                
                <div style="text-align: center;">
                    <div id="qr-izhod"></div>
                    <div id="qr-url-tekst"></div>
                </div>
            </div>
        </div>
        
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- NOVO: Leaflet.draw JS knjižnica za risanje in označevanje -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNdPEQjxMFttBgz1_h87RP6SEBjvaELdFth-28Q2HkEPBO08BWsFKQtMyav0SIhaq16w/exec";

    const navadnaMapa = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    });

    const satelitskaMapa = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS'
    });

    const map = L.map('zemljevid', {
        center: [46.3925, 15.5727],
        zoom: 15,
        layers: [satelitskaMapa]
    });

    const osnovniSloji = {
        "Satelitski posnetek": satelitskaMapa,
        "Navaden zemljevid": navadnaMapa
    };
    
    L.control.layers(osnovniSloji, null, { position: 'bottomright' }).addTo(map);

    /* ========================================================================
       NOVO: UPRAVLJANJE INTERVENCIJ / DOGODKOV
       ======================================================================== */
    let vseIntervencije = ["Splošno"];
    let trenutnaIntervencija = "Splošno";

    function naloziIntervencije() {
        const shranjene = localStorage.getItem("epv_intervencije_seznam");
        const trenutna = localStorage.getItem("epv_intervencije_trenutna");
        if (shranjene) vseIntervencije = JSON.parse(shranjene);
        if (trenutna && vseIntervencije.includes(trenutna)) trenutnaIntervencija = trenutna;
        osveziSpustniSeznamIntervencij();
    }

    function osveziSpustniSeznamIntervencij() {
        const select = document.getElementById("izbiraIntervencije");
        select.innerHTML = "";
        vseIntervencije.forEach(intervencija => {
            const opt = document.createElement("option");
            opt.value = intervencija;
            opt.innerText = intervencija;
            if (intervencija === trenutnaIntervencija) opt.selected = true;
            select.appendChild(opt);
        });
    }

    function ustvariIntervencijo() {
        const vnos = document.getElementById("novoImeIntervencije");
        const ime = vnos.value.trim();
        if (!ime) return;
        if (vseIntervencije.includes(ime)) {
            alert("Dogodek s tem imenom že obstaja!");
            return;
        }
        vseIntervencije.push(ime);
        trenutnaIntervencija = ime;
        localStorage.setItem("epv_intervencije_seznam", JSON.stringify(vseIntervencije));
        localStorage.setItem("epv_intervencije_trenutna", trenutnaIntervencija);
        vnos.value = "";
        osveziSpustniSeznamIntervencij();
        izrisiSektorjeZaTrenutnoIntervencijo();
    }

    function zamenjajIntervencijo() {
        trenutnaIntervencija = document.getElementById("izbiraIntervencije").value;
        localStorage.setItem("epv_intervencije_trenutna", trenutnaIntervencija);
        izrisiSektorjeZaTrenutnoIntervencijo();
    }

    function shraniSektorjeVTekočoIntervencijo() {
        const podatki = [];
        narisaniSektorjiSloj.eachLayer(layer => {
            let geojson = layer.toGeoJSON();
            geojson.properties = geojson.properties || {};
            geojson.properties.epvBarva = layer.options.epvBarva || "red";
            if (layer instanceof L.Circle) {
                geojson.properties.radius = layer.getRadius();
                geojson.properties.layerType = 'circle';
            } else if (layer instanceof L.Marker) {
                geojson.properties.layerType = 'marker';
            } else if (layer instanceof L.Rectangle) {
                geojson.properties.layerType = 'rectangle';
            } else if (layer instanceof L.Polygon) {
                geojson.properties.layerType = 'polygon';
            } else if (layer instanceof L.Polyline) {
                geojson.properties.layerType = 'polyline';
            }
            podatki.push(geojson);
        });
        localStorage.setItem("epv_sektorji_" + trenutnaIntervencija, JSON.stringify(podatki));
    }

    function izrisiSektorjeZaTrenutnoIntervencijo() {
        narisaniSektorjiSloj.clearLayers();
        const shranjeno = localStorage.getItem("epv_sektorji_" + trenutnaIntervencija);
        if (!shranjeno) return;
        const podatki = JSON.parse(shranjeno);
        podatki.forEach(geojson => {
            const tip = geojson.properties.layerType;
            const barvaKoda = geojson.properties.epvBarva;
            const stil = pridobiNastavitveStila(barvaKoda);
            let layer;

            if (tip === 'circle') {
                const coords = geojson.geometry.coordinates;
                layer = L.circle([coords[1], coords[0]], { ...stil, radius: geojson.properties.radius });
            } else {
                layer = L.geoJSON(geojson, {
                    style: stil,
                    pointToLayer: function (geoJsonPoint, latlng) {
                        return L.marker(latlng);
                    }
                }).getLayers()[0];
            }

            if (layer) {
                layer.options.epvBarva = barvaKoda;
                if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {
                    layer.setStyle({ color: stil.color, weight: 4 });
                }
                urediPopupZaSektor(layer, barvaKoda);
                narisaniSektorjiSloj.addLayer(layer);
            }
        });
    }

    /* ========================================================================
       NOVO: VKLJUČITEV RISALNIH ORODIJ (SEKTORJI IN KOORDINATE)
       ======================================================================== */
    
    // Sloj, kjer se bodo shranjevali vsi naši ročno narisani sektorji
    const narisaniSektorjiSloj = new L.FeatureGroup();
    map.addLayer(narisaniSektorjiSloj);

    // Prevodi barv za izpis v sporočilu
    const slovarBarv = { "red": "Rdeča", "blue": "Modra", "gold": "Rumena", "green": "Zelena" };
    let drawControl;

    function pridobiNastavitveStila(barva) {
        let hex = "#d32f2f"; // Rdeča privzeto
        if(barva === "blue") hex = "#1976d2";
        if(barva === "gold") hex = "#fbc02d";
        if(barva === "green") hex = "#388e3c";
        
        return { color: hex, weight: 3, opacity: 0.8, fillColor: hex, fillOpacity: 0.35 };
    }

    function posodobiNastavitveRisanja() {
        const izbranaBarva = document.getElementById("trenutnaBarva").value;
        const stil = pridobiNastavitveStila(izbranaBarva);

        if (drawControl) { map.removeControl(drawControl); }

        drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: {
                polygon: { shapeOptions: stil, allowIntersection: false, showArea: true },
                polyline: { shapeOptions: { color: stil.color, weight: 4 } },
                circle: { shapeOptions: stil },
                rectangle: { shapeOptions: stil },
                marker: true,
                circlemarker: false
            },
            edit: {
                featureGroup: narisaniSektorjiSloj,
                remove: true
            }
        });
        map.addControl(drawControl);
    }
    
    // Sprožimo začetno nastavitev orodij za risanje
    posodobiNastavitveRisanja();

    // Funkcija, ki izračuna sredino ali koordinate narisanega elementa ter pripravi tekst za kopiranje
    function urediPopupZaSektor(layer, barvaKoda) {
        let tipElementa = "Sektor";
        let koordinateBesedilo = "";
        let cistiKoordinateTekst = ""; 
        
        if (layer instanceof L.Marker) {
            tipElementa = "Točka / Lokacija";
            let ll = layer.getLatLng();
            cistiKoordinateTekst = `${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}`;
            koordinateBesedilo = `<b>Lokacija:</b> ${cistiKoordinateTekst}`;
        } else if (layer instanceof L.Circle) {
            let ll = layer.getLatLng();
            let r = layer.getRadius().toFixed(0);
            cistiKoordinateTekst = `${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}`;
            koordinateBesedilo = `<b>Center:</b> ${cistiKoordinateTekst}<br><b>Radij:</b> ${r} m`;
        } else if (layer instanceof L.Polygon || layer instanceof L.Rectangle) {
            let bounds = layer.getBounds();
            let center = bounds.getCenter();
            cistiKoordinateTekst = `${center.lat.toFixed(6)}, ${center.lng.toFixed(6)}`;
            koordinateBesedilo = `<b>Sredina sektorja:</b> ${cistiKoordinateTekst}`;
        } else if (layer instanceof L.Polyline) {
            tipElementa = "Linija / Pot";
            let center = layer.getBounds().getCenter();
            cistiKoordinateTekst = `${center.lat.toFixed(6)}, ${center.lng.toFixed(6)}`;
            koordinateBesedilo = `<b>Sredina linije:</b> ${cistiKoordinateTekst}`;
        }

        let barvaIme = slovarBarv[barvaKoda] || "Neznana";
        let tekstZaKopiranje = `${tipElementa} (${barvaIme}) - Koordinate: ${cistiKoordinateTekst}`;

        let popupVsebina = `
            <div style="font-size:12px; min-width:160px;">
                <b style="color:${pridobiNastavitveStila(barvaKoda).color}; font-size:13px;">${tipElementa} (${barvaIme})</b><br><br>
                ${koordinateBesedilo}<br>
                <button class="gumb-kopiraj-popup" onclick="kopirajTekstVMedpomnilnik('${btoa(unescape(encodeURIComponent(tekstZaKopiranje)))}')">Kopiraj za enote</button>
            </div>
        `;
        layer.bindPopup(popupVsebina);
    }

    // Pomožna globalna funkcija za kopiranje koordinat iz popup oken v odložišče
    window.kopirajTekstVMedpomnilnik = function(base64Tekst) {
        let tekst = decodeURIComponent(escape(atob(base64Tekst)));
        navigator.clipboard.writeText(tekst).then(() => {
            alert("Kopirano v medpomnilnik:\n" + tekst);
        }).catch(err => {
            console.error("Napaka pri kopiranju: ", err);
        });
    };

    // Dogodek: Ko uporabnik konča z risanjem elementa na mapi
    map.on(L.Draw.Event.CREATED, function (e) {
        const layer = e.layer;
        const izbranaBarva = document.getElementById("trenutnaBarva").value;
        
        // Elementu dodelimo barvo, da jo vemo prebrati tudi kasneje ob kliku
        layer.options.epvBarva = izbranaBarva;
        
        // Pripravimo oblaček s koordinatami in gumbom za kopiranje
        urediPopupZaSektor(layer, izbranaBarva);
        
        narisaniSektorjiSloj.addLayer(layer);
        shraniSektorjeVTekočoIntervencijo();
        layer.openPopup();
    });

    // Dogodek: Če se elementi naknadno spreminjajo/urejajo, osvežimo koordinate
    map.on(L.Draw.Event.EDITED, function (e) {
        e.layers.eachLayer(function (layer) {
            let barva = layer.options.epvBarva || "red";
            urediPopupZaSektor(layer, barva);
        });
        shraniSektorjeVTekočoIntervencijo();
    });

    // Dogodek: Ko izbrišemo elemente
    map.on(L.Draw.Event.DELETED, function (e) {
        shraniSektorjeVTekočoIntervencijo();
    });

    /* ========================================================================
       KONEC RISALNIH ORODIJ
       ======================================================================== */

    let enoteMarkerji = {};
    let enoteSledi = {}; 
    let ročnoSkriteEnote = {};

    function preklopiCelZaslon(idElementa) {
        const element = document.getElementById(idElementa);
        
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
            if (element.requestFullscreen) { element.requestFullscreen(); } 
            else if (element.webkitRequestFullscreen) { element.webkitRequestFullscreen(); } 
            else if (element.msRequestFullscreen) { element.msRequestFullscreen(); }
            element.querySelector('.gumb-povecaj').innerText = "Zapri (ESC)";
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); } 
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } 
            else if (document.msExitFullscreen) { document.msExitFullscreen(); }
        }
    }

    function urediNapiseGumbov() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
            document.querySelectorAll('.gumb-povecaj').forEach(gumb => gumb.innerText = "Cel zaslon (ESC)");
        }
        setTimeout(() => { map.invalidateSize(); }, 200);
    }
    document.addEventListener('fullscreenchange', urediNapiseGumbov);
    document.addEventListener('webkitfullscreenchange', urediNapiseGumbov);
    document.addEventListener('msfullscreenchange', urediNapiseGumbov);

    function ustvariIkono(barva) {
        let url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png";
        if (barva === "blue") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png";
        if (barva === "gold") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png";
        if (barva === "green") url = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png";

        return L.icon({
            iconUrl: url, shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
    }

    function spremembaTipaFiltra() {
        const tip = document.getElementById("filterTipCas").value;
        document.getElementById("filterMinute").style.display = (tip === "ročno") ? "block" : "none";
        shraniNastavitve();
    }

    function shraniNastavitve() {
        localStorage.setItem("epv_filter_tip", document.getElementById("filterTipCas").value);
        localStorage.setItem("epv_filter_min", document.getElementById("filterMinute").value);
        localStorage.setItem("epv_skrite_enote", JSON.stringify(ročnoSkriteEnote));
        osveziZemljevid();
    }

    function naloziNastavitev() {
        const t = localStorage.getItem("epv_filter_tip");
        const m = localStorage.getItem("epv_filter_min");
        const s = localStorage.getItem("epv_skrite_enote");
        
        if (t) document.getElementById("filterTipCas").value = t;
        if (m) document.getElementById("filterMinute").value = m;
        if (s) ročnoSkriteEnote = JSON.parse(s);
        
        document.getElementById("filterMinute").style.display = (t === "ročno") ? "block" : "none";
    }

    function preklopiEnoto(imeEnote, obkljukano) {
        ročnoSkriteEnote[imeEnote] = !obkljukano;
        shraniNastavitve();
    }

    let qrcode = null;
    function ustvariQrKodo() {
        const tip = document.getElementById('qrTip').value;
        const clanov = document.getElementById('qrClanov').value;
        const končniUrl = `https://gzsbpov.github.io/enota-EPV/terenEPV.html?tip=${tip}&clanov=${clanov}`;
        
        document.getElementById("qr-izhod").innerHTML = "";
        document.getElementById("qr-url-tekst").innerText = končniUrl;

        qrcode = new QRCode(document.getElementById("qr-izhod"), {
            text: končniUrl, width: 110, height: 110, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });
    }

    window.addEventListener('load', () => {
        naloziIntervencije();
        izrisiSektorjeZaTrenutnoIntervencijo();
        naloziNastavitev();
        ustvariQrKodo();
    });

    function pretvoriVCas(suroviCas) {
        if (!suroviCas) return new Date(0);
        let d = new Date(suroviCas);
        if (!isNaN(d.getTime())) return d;
        
        if (String(suroviCas).includes(":")) {
            const deli = String(suroviCas).split(" ")[0].split(":");
            if (deli.length >= 2) {
                let danes = new Date();
                danes.setHours(parseInt(deli[0]), parseInt(deli[1]), parseInt(deli[2] || 0));
                return danes;
            }
        }
        return new Date(0);
    }

    async function osveziZemljevid() {
        try {
            const response = await fetch(SCRIPT_URL);
            const matriksaPodatkov = await response.json();
            if (matriksaPodatkov.status === "error") return;

            let zgodovinaPoti = {};
            let zadnjeLokacije = {};
            let naborVsehEnot = new Set();
            
            const filterTip = document.getElementById("filterTipCas").value;
            const filterMinut = parseInt(document.getElementById("filterMinute").value) || 15;
            const trenutniCasMs = new Date().getTime();

            for (let i = 1; i < matriksaPodatkov.length; i++) {
                const vrstica = matriksaPodatkov[i];
                if (vrstica.length < 5) continue;

                const cas = vrstica[0];
                let surovaEnota = String(vrstica[1]).trim();
                const lat = parseFloat(String(vrstica[2]).replace(',', '.'));
                const lon = parseFloat(String(vrstica[3]).replace(',', '.'));
                const natancnost = String(vrstica[4]).trim();

                if (isNaN(lat) || isNaN(lon)) continue;

                let tip = "gasilec";
                let ime = surovaEnota;
                let clanov = "1";

                if (surovaEnota.includes(":")) {
                    const deli = surovaEnota.split(":");
                    tip = deli[0].toLowerCase();
                    ime = deli[1];
                    clanov = deli[2] || "1";
                } else {
                    if (surovaEnota.toLowerCase().includes("vodja") || surovaEnota.toLowerCase().includes("poveljnik") || surovaEnota.toLowerCase().includes("epv") || surovaEnota.toLowerCase().includes("štab")) tip = "vodja";
                    if (surovaEnota.toLowerCase().includes("vozilo") || surovaEnota.toLowerCase().includes("gvc") || surovaEnota.toLowerCase().includes("ac")) tip = "vozilo";
                }

                naborVsehEnot.add(ime);

                if (ročnoSkriteEnote[ime] === true) continue;

                if (filterTip === "ročno") {
                    const osvezenOb = pretvoriVCas(cas);
                    const starostMinut = (trenutniCasMs - osvezenOb.getTime()) / 1000 / 60;
                    if (starostMinut > filterMinut) continue; 
                }

                if (!zgodovinaPoti[ime]) zgodovinaPoti[ime] = [];
                zgodovinaPoti[ime].push([lat, lon]);

                zadnjeLokacije[ime] = { lat, lon, cas, natancnost, tip, clanov };
            }

            const seznamPanel = document.getElementById("seznamEnotGumbi");
            let seznamHtml = "";
            Array.from(naborVsehEnot).sort().forEach(imeE => {
                const jeVidna = !ročnoSkriteEnote[imeE];
                seznamHtml += `
                    <div class="enota-stikalo">
                        <span>${imeE}</span>
                        <input type="checkbox" ${jeVidna ? 'checked' : ''} onchange="preklopiEnoto('${imeE}', this.checked)">
                    </div>
                `;
            });
            if(seznamHtml !== "") seznamPanel.innerHTML = seznamHtml;

            for (const ime in enoteSledi) {
                if (!zgodovinaPoti[ime]) { map.removeLayer(enoteSledi[ime]); delete enoteSledi[ime]; }
            }

            for (const [ime, koordinate] of Object.entries(zgodovinaPoti)) {
                let barvaCrte = "#d32f2f"; 
                let tip = zadnjeLokacije[ime].tip;
                if (tip === "vozilo") barvaCrte = "#1976d2";
                if (tip === "vodja") barvaCrte = "#fbc02d";
                if (tip === "resevalec") barvaCrte = "#388e3c";

                if (enoteSledi[ime]) { enoteSledi[ime].setLatLngs(koordinate); } 
                else { enoteSledi[ime] = L.polyline(koordinate, { color: barvaCrte, weight: 3, opacity: 0.6 }).addTo(map); }
            }

            for (const ime in enoteMarkerji) {
                if (!zadnjeLokacije[ime]) { map.removeLayer(enoteMarkerji[ime]); delete enoteMarkerji[ime]; }
            }

            for (const [ime, lok] of Object.entries(zadnjeLokacije)) {
                let barvaMarkerja = "red";
                if (lok.tip === "vozilo") barvaMarkerja = "blue";
                if (lok.tip === "vodja") barvaMarkerja = "gold";
                if (lok.tip === "resevalec") barvaMarkerja = "green";

                let prikazniNapis = ime;
                if (lok.tip === "gasilec") { prikazniNapis = `${ime} (${lok.clanov})`; }

                const podrobnostiTekst = `<b>${ime}</b> (${lok.tip.toUpperCase()})<br>Članov: ${lok.clanov}<br>Zadnji GPS: ${lok.cas}<br>Natančnost: ${lok.natancnost} m`;

                if (enoteMarkerji[ime]) {
                    enoteMarkerji[ime].setLatLng([lok.lat, lok.lon]);
                    enoteMarkerji[ime].setIcon(ustvariIkono(barvaMarkerja));
                    enoteMarkerji[ime].getPopup().setContent(podrobnostiTekst);
                    enoteMarkerji[ime].setTooltipContent(prikazniNapis);
                } else {
                    let noviMarker = L.marker([lok.lat, lok.lon], { icon: ustvariIkono(barvaMarkerja) }).addTo(map).bindPopup(podrobnostiTekst);
                    noviMarker.bindTooltip(prikazniNapis, { permanent: true, direction: 'top', offset: [0, -40], className: 'stalni-napis' }).openTooltip();
                    enoteMarkerji[ime] = noviMarker;
                }
            }
        } catch (error) {
            console.error("Napaka na zemljevidu:", error);
        }
    }

    osveziZemljevid();
    setInterval(osveziZemljevid, 5000);
</script>
